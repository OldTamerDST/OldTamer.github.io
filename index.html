<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digimon Sudtamer - Randomizer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0b1116;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            gap: 20px;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background-color: #152228;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #ff452b;
            width: 100%;
            max-width: 520px;
            box-sizing: border-box;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }
        h1 {
            color: #ff452b;
            margin: 0;
            font-size: 28px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        p.subtitle {
            color: #ff452b;
            margin: 5px 0 25px 0;
            font-size: 14px;
            opacity: 0.8;
        }
        .main-box {
            background-color: #0d161b;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #ff452b;
        }
        .top-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap; 
        }
        .btn-set {
            background-color: #ff452b;
            color: #ffffff;
            border: none;
            padding: 6px 20px;
            border-radius: 15px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s, background-color 0.2s;
        }
        .btn-set:hover {
            opacity: 0.9;
        }
        .btn-set.active {
            background-color: #ffffff;
            color: #ff452b;
            box-shadow: 0 0 10px rgba(255, 69, 43, 0.5);
        }
        .grid-row {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            gap: 15px;
        }
        .btn-lista {
            background-color: #ff452b;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            width: 120px;
            text-align: center;
            transition: transform 0.1s;
            flex-shrink: 0;
        }
        .btn-lista:active {
            transform: scale(0.95);
        }
        .display-item {
            background-color: #1a262d;
            color: #a0aec0;
            flex-grow: 1;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 14px;
            text-align: left;
            border: 1px solid #23333c;
            min-height: 18px;
            transition: color 0.3s;
            word-break: break-word; 
        }
        .display-item.nuevo {
            color: #ffffff;
        }
        
        .info-box {
            background-color: #0d161b;
            border: 1px solid #ff452b;
            border-radius: 12px;
            width: 100%;
            max-width: 540px;
            box-sizing: border-box;
            padding: 20px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .legend-text {
            font-size: 14px;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 12px;
            min-height: 24px;
        }
        .social-links {
            font-size: 12px;
            color: #a0aec0;
        }
        .social-links a {
            font-weight: bold;
            text-decoration: none;
            margin: 0 2px;
        }
        .link-reddit { color: #ff4500; }
        .link-facebook { color: #1877f2; }
        .link-x { color: #1da1f2; }
        .link-soporte { color: #ff6b54; }
        .soporte-box { margin-top: 8px; }

        @media (max-width: 480px) {
            h1 {
                font-size: 22px;
            }
            .container {
                padding: 20px 15px;
            }
            .main-box {
                padding: 15px 10px;
            }
            .grid-row {
                gap: 10px;
            }
            .btn-lista {
                width: 90px;
                font-size: 12px;
                padding: 8px 5px;
            }
            .display-item {
                font-size: 13px;
                padding: 8px 10px;
            }
            .legend-text {
                font-size: 15px;
            }
        }
    </style>
</head>

const etiquetasVisuales = {
    "digitama": ["Base", "Patrones", "Color patrón", "Extra 1", "Extra 2"], 
    "digimon": ["Etapa", "Base", "Ojos", "Boca", "Cola", "Extremidades", "Piel", "Colores", "Extra"],
};

const descripcionesCategorias = {
    "Base": "Cuerpo, vestimenta y forma general.",
    "Patrones": "Diseños o marcas de textura sobre la superficie.",
    "Color patrón": "Colores del patrón.",
    "Extra 1": "Detalles extras a agregar.",
    "Extra 2": "Detalles extras a para que sufras.",
    "Etapa": "Estadio evolutivo.",
    "Ojos": "Forma de los ojos y mirada.",
    "Boca": "Forma general de la nariz, hocico y/o mandíbula.",
    "Cola": "Protuberancia, turbina, cola, hélice o lo que toque.",
    "Extremidades": "Brazos, piernas, patas, alas, tentáculos, ¿Ruedas?",
    "Piel": "Textura (metálico, con pelaje, escamas, placas, etc.).",
    "Colores": "Distribución de los colores.",
    "Extra": "Ropa, armadura, tatuajes, cremalleras, armas, entidades digitales, objetos, accesorios, placas remachadas en la piel, etc..."
};

let setActual = "digitama";
let etapaDigimon = "Child"; 

function inicializarInterfaz() {
    const contenedor = document.getElementById("gridContenedor");
    contenedor.innerHTML = ""; 

    const cantidadListas = etiquetasVisuales[setActual].length;

    for (let i = 0; i < cantidadListas; i++) {
        const fila = document.createElement("div");
        fila.className = "grid-row";

        const nombreCategoria = etiquetasVisuales[setActual][i];

        const boton = document.createElement("button");
        boton.className = "btn-lista";
        boton.innerText = nombreCategoria;
        
        boton.onclick = () => {
            generarEspecifico(i.toString());
            actualizarLeyenda(nombreCategoria);
        };

        const visor = document.createElement("div");
        visor.className = "display-item";
        visor.id = `visor-${i}`;
        visor.innerText = "Item"; 

        fila.appendChild(boton);
        fila.appendChild(visor);
        contenedor.appendChild(fila);
    }
}

function actualizarLeyenda(categoria) {
    const contenedorLeyenda = document.getElementById("leyendaCategoria");
    if (descripcionesCategorias[categoria]) {
        contenedorLeyenda.innerText = descripcionesCategorias[categoria];
    } else {
        contenedorLeyenda.innerText = `${categoria}: Descripción de categoría en desarrollo.`;
    }
}

function cambiarSet(nuevoSet, elementoBoton) {
    setActual = nuevoSet;
    
    if(setActual === "digimon") etapaDigimon = "Child"; 
    
    const botones = document.querySelectorAll('.btn-set');
    botones.forEach(btn => btn.classList.remove('active'));
    elementoBoton.classList.add('active');
    
    document.getElementById("leyendaCategoria").innerText = "Selecciona una categoría por vez";
    
    inicializarInterfaz();
}

function generarEspecifico(indice) {
    let opcionesDisponibles = [];
    const visor = document.getElementById(`visor-${indice}`);
    
    if (setActual === "digimon" && indice !== "0") {
        const etapasRequeridas = bancoDatos["digimon"]["reglas"][etapaDigimon][indice];
        
        etapasRequeridas.forEach(etapaRef => {
            const poolEspecifico = bancoDatos["digimon"]["listasMaestras"][etapaRef];
            if (poolEspecifico) {
                opcionesDisponibles = opcionesDisponibles.concat(poolEspecifico);
            }
        });
    } else {
        opcionesDisponibles = bancoDatos[setActual][indice];
    }
    
    if (opcionesDisponibles && opcionesDisponibles.length > 0) {
        const eleccion = opcionesDisponibles[Math.floor(Math.random() * opcionesDisponibles.length)];
        visor.innerText = eleccion;
        visor.classList.add("nuevo");
        visor.style.color = ""; 
        
        if (setActual === "digimon" && indice === "0") {
            etapaDigimon = eleccion;
            
            for (let j = 1; j < etiquetasVisuales["digimon"].length; j++) {
                const otroVisor = document.getElementById(`visor-${j}`);
                if (otroVisor) {
                    otroVisor.innerText = `Re-tirar para ${etapaDigimon}`;
                    otroVisor.classList.remove("nuevo");
                    otroVisor.style.color = "#ff452b"; 
                }
            }
        }
    } else {
        visor.innerText = "Sin datos en esta lista";
    }
}
